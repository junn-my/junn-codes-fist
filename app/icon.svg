<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Three overlapping circles in pastel, arranged in a triangle -->
  <circle cx="50" cy="36" r="22" fill="#C6DEF1" opacity="0.9" />
  <circle cx="35" cy="64" r="22" fill="#F2C4CE" opacity="0.9" />
  <circle cx="65" cy="64" r="22" fill="#C9E4DE" opacity="0.9" />

  <!-- Overlap blends -->
  <circle cx="50" cy="36" r="22" fill="#C6DEF1" opacity="0.35" />
  <circle cx="35" cy="64" r="22" fill="#F2C4CE" opacity="0.35" />
  <circle cx="65" cy="64" r="22" fill="#C9E4DE" opacity="0.35" />
</svg>
